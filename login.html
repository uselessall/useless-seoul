        <h1>Login</h1>
        <p>돌아온 걸 환영해요. 오늘도 쓸모없이.</p>
      </header>
      <form class="co__form" id="loginForm">
        <label for="liEmail">이메일</label>

        <label for="liPw">비밀번호</label>

        <p class="form-err" id="authErr" hidden></p>
        <button type="submit" class="btn btn--solid btn--lg">로그인</button>
        <p class="auth__alt">계정이 없다면 <a href="signup.html">회원가입 →</a></p>
