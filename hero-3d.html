<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D HERO LAB — USÉLESS SEOUL</title>
  <meta name="robots" content="noindex" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --ink:#111; --grey:#767676;
      --serif:"Instrument Serif","Times New Roman",serif;
      --sans:"Pretendard Variable",Pretendard,-apple-system,sans-serif; }
    body { font-family: var(--sans); background: #fff; color: var(--ink); }
    .lab-note { position: fixed; top:0; left:0; right:0; z-index:10; padding:10px 20px;
      font-size:12px; letter-spacing:.08em; background:var(--ink); color:#fff; text-align:center; }
    .hero3d { display:grid; grid-template-columns:1fr 1fr; align-items:center;
      min-height:100vh; max-width:1280px; margin:0 auto; padding:80px 40px 40px; gap:40px; }
    #hero3d-lab-root { width:100%; aspect-ratio:1/1; max-height:78vh; position:relative;
      cursor:grab; touch-action:pan-y; user-select:none; -webkit-user-select:none;
      background: radial-gradient(ellipse 90% 70% at 50% 42%, #f7f7f8 0%, #ececee 68%, #e4e4e6 100%); }
    #hero3d-lab-root:active { cursor:grabbing; }
    .stage-hint { position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
      font-size:11px; letter-spacing:.14em; color:var(--grey); pointer-events:none; text-transform:uppercase; }
    .hero3d__text h1 { font-family:var(--serif); font-weight:400;
      font-size:clamp(56px,7vw,104px); line-height:.95; letter-spacing:-.01em; }
    .hero3d__text h1 em { font-style:italic; }
    .hero3d__text p { margin-top:28px; font-size:16px; line-height:1.75; color:#333; }
    .btn { display:inline-block; margin-top:36px; padding:16px 34px; background:var(--ink);
      color:#fff; text-decoration:none; font-size:13px; letter-spacing:.12em; }
    @media (max-width:900px){ .hero3d{grid-template-columns:1fr; padding-top:70px; text-align:center;}
      #hero3d-lab-root{max-height:52vh; order:-1;} }
  </style>
</head>
<body>
  <div class="lab-note">3D HERO LAB v2 — 진짜 3D 병 (R3F·Draco GLB·스튜디오 라이팅·마우스 패럴랙스·드래그)</div>
  <section class="hero3d">
    <div id="hero3d-lab-root" aria-label="리드 디퓨저 3D — 마우스를 움직이거나 드래그">
      <span class="stage-hint">move mouse / drag</span>
    </div>
    <div class="hero3d__text">
      <h1>SEOUL,<br /><em>BOTTLED.</em></h1>
      <p>가장 쓸모없던 시간이, 가장 잊히지 않는 시간이다.<br />그 시간의 공기를 병에 담은 리드 디퓨저 — 파일럿 3종.</p>
      <a class="btn" href="shop.html">SHOP — 파일럿 3종 보기</a>
    </div>
  </section>
  <script src="assets/js/scene3d-dist/scene3d.js?v=7" defer></script>
</body>
</html>
